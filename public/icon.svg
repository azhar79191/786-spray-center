<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D03F"/>
      <stop offset="50%" style="stop-color:#D4A017"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Gold circular border (outer ring) -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#goldGrad)" stroke-width="12" opacity="0.9"/>
  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.4"/>

  <!-- Centered B letter -->
  <text x="256" y="285"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="180"
        font-weight="800"
        fill="url(#goldGrad)"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="url(#glow)">B</text>
</svg>
