<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4C430;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bgGradient)"/>
  
  <!-- Leaf Icon -->
  <g transform="translate(16, 12)">
    <!-- Main Leaf -->
    <path d="M16 2C16 2 8 6 6 16C4 26 8 38 16 40C24 38 28 26 26 16C24 6 16 2 16 2Z" 
          fill="url(#leafGradient)" 
          stroke="#F4C430" 
          stroke-width="1.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Leaf Vein -->
    <path d="M16 4V38" 
          stroke="#0F172A" 
          stroke-width="1.5" 
          stroke-linecap="round"/>
    
    <!-- Left Veins -->
    <path d="M16 12L10 16" 
          stroke="#0F172A" 
          stroke-width="1" 
          stroke-linecap="round"/>
    <path d="M16 20L9 24" 
          stroke="#0F172A" 
          stroke-width="1" 
          stroke-linecap="round"/>
    <path d="M16 28L11 30" 
          stroke="#0F172A" 
          stroke-width="1" 
          stroke-linecap="round"/>
    
    <!-- Right Veins -->
    <path d="M16 12L22 16" 
          stroke="#0F172A" 
          stroke-width="1" 
          stroke-linecap="round"/>
    <path d="M16 20L23 24" 
          stroke="#0F172A" 
          stroke-width="1" 
          stroke-linecap="round"/>
    <path d="M16 28L21 30" 
          stroke="#0F172A" 
          stroke-width="1" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Subtle Shine Effect -->
  <circle cx="20" cy="16" r="3" fill="white" opacity="0.2"/>
</svg>
