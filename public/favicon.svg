<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#060e1f"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="40%" stop-color="#F4D03F"/>
      <stop offset="100%" stop-color="#92600A"/>
    </linearGradient>
    <radialGradient id="gr" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#92600A"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Gold border -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.7"/>

  <!-- Shield outline -->
  <path d="M12 10 L52 10 L52 36 C52 50 32 58 32 58 C32 58 12 50 12 36 Z"
    fill="none" stroke="url(#g1)" stroke-width="1.8" opacity="0.8"/>

  <!-- Top bar inside shield -->
  <rect x="14" y="11.5" width="36" height="5" rx="1.5" fill="url(#g1)" opacity="0.9"/>

  <!-- Wheat stalk -->
  <line x1="32" y1="46" x2="32" y2="20" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Wheat grains — left -->
  <ellipse cx="25.5" cy="37" rx="6.5" ry="3" fill="url(#gr)" transform="rotate(-38 25.5 37)"/>
  <ellipse cx="24"   cy="29" rx="5.5" ry="2.5" fill="url(#gr)" transform="rotate(-40 24 29)" opacity="0.9"/>
  <ellipse cx="24.5" cy="22" rx="4.5" ry="2" fill="url(#gr)" transform="rotate(-42 24.5 22)" opacity="0.8"/>

  <!-- Wheat grains — right -->
  <ellipse cx="38.5" cy="37" rx="6.5" ry="3" fill="url(#gr)" transform="rotate(38 38.5 37)"/>
  <ellipse cx="40"   cy="29" rx="5.5" ry="2.5" fill="url(#gr)" transform="rotate(40 40 29)" opacity="0.9"/>
  <ellipse cx="39.5" cy="22" rx="4.5" ry="2" fill="url(#gr)" transform="rotate(42 39.5 22)" opacity="0.8"/>

  <!-- Top terminal grain -->
  <ellipse cx="32" cy="18" rx="3" ry="6" fill="url(#gr)" filter="url(#glow)"/>

  <!-- Divider -->
  <line x1="18" y1="49" x2="46" y2="49" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
  <circle cx="32" cy="49" r="2" fill="#D4A017"/>
  <circle cx="18" cy="49" r="1.2" fill="#D4A017" opacity="0.6"/>
  <circle cx="46" cy="49" r="1.2" fill="#D4A017" opacity="0.6"/>

  <!-- "B" monogram — pure path, no text -->
  <g transform="translate(26, 51)" fill="url(#g1)" filter="url(#glow)">
    <rect x="0" y="0" width="3" height="11" rx="0.5"/>
    <path d="M2.5 0 L7 0 C10 0 10 5 7 5 L2.5 5 Z"/>
    <path d="M2.5 5.8 L7.5 5.8 C11 5.8 11 11 7.5 11 L2.5 11 Z"/>
  </g>
</svg>
