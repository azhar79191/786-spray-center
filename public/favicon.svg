<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGradient)"/>
  
  <!-- Decorative Ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.3"/>
  
  <!-- Main Leaf Icon -->
  <g transform="translate(16, 12)">
    <!-- Left Leaf -->
    <path d="M8 24 Q2 18, 4 10 Q6 4, 10 2 Q12 8, 10 14 Q9 18, 8 24" 
          fill="url(#leafGradient)" opacity="0.9"/>
    
    <!-- Right Leaf -->
    <path d="M24 24 Q30 18, 28 10 Q26 4, 22 2 Q20 8, 22 14 Q23 18, 24 24" 
          fill="url(#leafGradient)"/>
    
    <!-- Center Stem -->
    <path d="M16 2 L16 28" stroke="url(#leafGradient)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Leaf Veins -->
    <path d="M10 8 L16 10" stroke="#0F172A" stroke-width="0.8" opacity="0.3"/>
    <path d="M10 12 L16 14" stroke="#0F172A" stroke-width="0.8" opacity="0.3"/>
    <path d="M10 16 L16 18" stroke="#0F172A" stroke-width="0.8" opacity="0.3"/>
    <path d="M22 8 L16 10" stroke="#0F172A" stroke-width="0.8" opacity="0.3"/>
    <path d="M22 12 L16 14" stroke="#0F172A" stroke-width="0.8" opacity="0.3"/>
    <path d="M22 16 L16 18" stroke="#0F172A" stroke-width="0.8" opacity="0.3"/>
  </g>
  
  <!-- Spray Droplets -->
  <circle cx="20" cy="48" r="1.5" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="26" cy="50" r="1.2" fill="url(#goldGradient)" opacity="0.7"/>
  <circle cx="32" cy="52" r="1.8" fill="url(#goldGradient)" opacity="0.9"/>
  <circle cx="38" cy="50" r="1.2" fill="url(#goldGradient)" opacity="0.7"/>
  <circle cx="44" cy="48" r="1.5" fill="url(#goldGradient)" opacity="0.8"/>
  
  <!-- Highlight -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
</svg>
